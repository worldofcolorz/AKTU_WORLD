services:
  # Backend API (Flask)
  - type: web
    name: aktu-backend
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --worker-class gthread --threads 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: SKIP_FRONTEND_BUILD
        value: "1"
      - key: VISIT_COUNTER_FILE
        value: /opt/render/project/src/visit_count.txt
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_DRIVE_ROOT_FOLDER_ID
        sync: false
      - key: DRIVE_CACHE_MAX_MB
        value: "800"
      - key: DRIVE_TREE_CACHE_TTL_SECONDS
        value: "900"
      - key: ALLOWED_ORIGINS
        fromService:
          type: static
          name: aktu-frontend
          property: url
    disk:
      name: visit-counter-storage
      mountPath: /opt/render/project/src
      sizeGB: 1

  # Frontend (Vite React) as a Static Site
  - type: static
    name: aktu-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: aktu-backend
          property: url
      - key: VITE_GOOGLE_SHEETS_SCRIPT_URL
        value: https://script.google.com/macros/s/AKfycbzkAkCV3sCqR_59HbIUQjgNWEKT1vE3fXc1Oeja8huPSC_9NepEt1VE-n9NacliGoMO/exec
    routes:
      # SPA history fallback so routes like /papers work on refresh
      - type: rewrite
        source: /*
        destination: /index.html


